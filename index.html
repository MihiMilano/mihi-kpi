<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIHI Milano · KPI Saloni</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#1a1510;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;margin:0}
.logo{font-size:32px;font-weight:900;letter-spacing:8px;color:#a67318;margin-bottom:8px;text-align:center}
.sub{font-size:13px;color:#6b5f54;letter-spacing:2px;text-transform:uppercase;margin-bottom:48px;text-align:center}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:400px}
.card{background:#fff;border-radius:16px;padding:22px 24px;text-decoration:none;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.card-left{display:flex;align-items:center;gap:14px}
.card-icon{width:44px;height:44px;border-radius:12px;background:rgba(166,115,24,.12);display:flex;align-items:center;justify-content:center;font-size:20px}
.card-name{font-size:17px;font-weight:800;color:#1a1510}
.card-addr{font-size:11px;color:#6b6055;margin-top:2px}
.chev{font-size:20px;color:#c8c3bb}
.foot{margin-top:40px;font-size:10px;color:#3a3028;text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div class="logo">MIHI</div>
<div class="sub">Management System · KPI Saloni</div>
<div class="cards">
  <a class="card" href="nolo.html">
    <div class="card-left">
      <div class="card-icon">&#9986;</div>
      <div><div class="card-name">Mihi Nolo</div><div class="card-addr">Viale Monza 16</div></div>
    </div>
    <div class="chev">&#8250;</div>
  </a>
  <a class="card" href="rembrandt47.html">
    <div class="card-left">
      <div class="card-icon">&#9986;</div>
      <div><div class="card-name">Rembrandt47</div><div class="card-addr">Tortona &amp; San Siro</div></div>
    </div>
    <div class="chev">&#8250;</div>
  </a>
  <a class="card" href="isola.html">
    <div class="card-left">
      <div class="card-icon">&#9986;</div>
      <div><div class="card-name">Mihi Isola</div><div class="card-addr">Alserio 3</div></div>
    </div>
    <div class="chev">&#8250;</div>
  </a>
</div>
<div class="foot">MIHI Milano · Uso interno riservato</div>
</body>
</html>

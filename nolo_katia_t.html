<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Katia · MIHI</title>
<script>document.write('<scr'+'ipt src="data_nolo.js?t='+Date.now()+'"><\/scr'+'ipt>');</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#f5f0e8;min-height:100vh}
.cc{background:#1a1510;border:1px solid #2a2218;border-radius:14px;padding:14px}
.cl{font-size:10px;font-weight:700;color:#8a7a60;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cv{font-size:22px;font-weight:900;color:#f5f0e8;line-height:1}
.ct{display:flex;align-items:center;gap:4px;margin-top:5px;font-size:10px;color:#6b6055}
.ct b{font-size:13px;font-weight:800;color:#a67318}
.cb{height:5px;background:#2a2218;border-radius:3px;margin-top:8px;overflow:hidden}
.cbf{height:100%;border-radius:3px}
.cp{font-size:10px;color:#8a7a60;font-weight:700;margin-top:4px}
</style>
</head>
<body>
<div style="background:#1a1510;border-bottom:1px solid #2a2218;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0">
  <div style="font-size:12px;font-weight:800;letter-spacing:2px;color:#a67318">MIHI</div>
  <div style="font-size:11px;color:#8a7a60;text-align:right">Mihi Nolo · Viale Monza 16<br><span id="mlabel">—</span></div>
</div>
<div style="padding:16px;max-width:540px;margin:0 auto">
  <div style="background:linear-gradient(135deg,#be185d20,#be185d08);border:1px solid #be185d40;border-radius:16px;padding:18px;margin-bottom:16px;text-align:center">
    <div style="font-size:22px;font-weight:800;color:#be185d;margin-bottom:4px">Ciao, Katia! 👋</div>
    <div style="font-size:13px;color:#8a7a60">I tuoi KPI di questa settimana</div>
  </div>
  <div style="background:#a6731820;border:1px solid #a6731840;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;color:#a67318;display:inline-block;margin-bottom:16px" id="wbadge">📅 —</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px" id="grid"></div>
  <div style="font-size:11px;color:#6b6055;text-align:center;padding:8px" id="footer">MIHI Milano</div>
</div>
<script>
const ME='katia_t';
function getMk(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
const mk=getMk(); const m=(typeof MESI!=='undefined')?MESI[mk]:null;
let sw=null;
if(m){const t=new Date();t.setHours(12,0,0,0);
  for(const s of m.settimane){const da=new Date(s.da);da.setHours(0,0,0,0);const a=new Date(s.a);a.setHours(23,59,59,0);if(t>=da&&t<=a){sw=s;break;}}
  if(!sw)sw=[...m.settimane].reverse().find(s=>new Date(s.da)<=t)||m.settimane[0];}
const c=m?m.collaboratori.find(x=>x.id===ME):null;
const st=(sw&&typeof STORICO!=='undefined'&&STORICO[mk]&&STORICO[mk][sw.id]&&STORICO[mk][sw.id][ME])||{};
document.getElementById('mlabel').textContent=m?m.label:'—';
document.getElementById('wbadge').textContent='📅 '+(sw?sw.label:'—');
const eur=v=>'€'+Math.round(v).toLocaleString('it-IT');
const f1=v=>'€'+Number(v).toFixed(1).replace('.',',');
function card(icon,lbl,av,tv,fa,ft){
  const has=av!=null, hast=tv!=null;
  const pr=(has&&hast&&tv)?Math.round(av/tv*100):null;
  const w=pr==null?0:Math.min(100,pr);
  const colr=pr==null?'#3a3228':(pr>=100?'#22c55e':(pr>=75?'#f59e0b':'#ef4444'));
  return '<div class="cc"><div class="cl">'+icon+' '+lbl+'</div>'+
   '<div class="cv">'+(has?fa(av):'—')+'</div>'+
   '<div class="ct">su <b>'+(hast?ft(tv):'—')+'</b></div>'+
   '<div class="cb"><div class="cbf" style="width:'+w+'%;background:'+colr+'"></div></div>'+
   '<div class="cp">'+(pr==null?'In attesa dati':pr+'% del target')+'</div></div>';
}
let h='';
if(!c){h='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#8a7a60">Scheda non disponibile.</div>';}
else{
  h+=card('💰','Fatturato',st.fat,c.fat_tw,eur,eur);
  h+=card('👥','Clienti fatti',st.pre,c.pre_tw,v=>Math.round(v),v=>Math.round(v));
  h+=card('🛍️','Vendite',st.ret,c.ret_tw,v=>Math.round(v),v=>Math.round(v));
  h+=card('📅','Saturazione',st.sat,c.sat_tw,v=>Math.round(v)+'%',v=>Math.round(v)+'%');
  h+=card('🧾','Fiche media',st.fiche,c.fiche_t,f1,f1);
  h+=card('✂️','Servizi per fiche',st.serv,c.serv_t,v=>Number(v).toFixed(2),v=>Number(v).toFixed(2));
}
document.getElementById('grid').innerHTML=h;
const ua=(typeof STORICO!=='undefined'&&STORICO[mk])?STORICO[mk].ultimo_aggiornamento:null;
document.getElementById('footer').textContent=(ua&&ua!=='—'?'Aggiornato: '+ua+' · ':'')+'MIHI Milano';
</script>
</body>
</html>
